<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Syntra</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">

<link rel="shortcut icon" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f5f3;
color:#222;
}

/* HERO */

.hero{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;

padding:80px 20px;

}

.small{

letter-spacing:3px;
font-size:14px;
color:#2d5fbf;

}

h1{

font-size:56px;
margin:20px 0;

}

.hero p{

max-width:600px;
margin-bottom:8px;

}

.logo{

margin-top:40px;
width:180px;

}

/* BOTÕES */

.nav-area{

margin-top:50px;

display:flex;
flex-wrap:wrap;
gap:20px;

justify-content:center;

}

.page-btn{

background:#2d5fbf;

color:white;

padding:14px 32px;

border-radius:30px;

text-decoration:none;

font-weight:500;

transition:0.25s;

}

.page-btn:hover{

transform:scale(1.05);

}

/* SOCIAL */

.social{

margin-top:35px;

display:flex;

gap:18px;

justify-content:center;

}

.social img{

width:40px;

}

/* COMUNIDADE */

.community{

margin-top:80px;

padding:60px 20px;

background:white;

}

.community h2{

margin-bottom:30px;

text-align:center;

}

.message{

background:#f5f5f3;

padding:15px;

border-radius:10px;

margin-bottom:15px;

max-width:700px;

margin-left:auto;
margin-right:auto;

}

/* RESPONSIVO */

@media (max-width:700px){

h1{
font-size:36px;
}

.logo{
width:140px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="small">SYNTRA</div>

<h1 id="title">TUDO EM SÓ UM LUGAR</h1>

<p id="line1">A internet fragmentou quem você é.</p>
<p id="line2">A Syntra vem para unificar sua identidade digital em um só lugar.</p>
<p id="line3">Presença, reputação e confiança conectadas.</p>
<p id="line4">O futuro da identidade começa agora 🚀</p>

<img src="logo.png" class="logo">

<div class="nav-area">

<a href="sobre.html" class="page-btn">Sobre</a>

<a href="projeto.html" class="page-btn">Projeto</a>

<a href="redes.html" class="page-btn">Redes</a>

<a href="comunidade.html" class="page-btn">Comunidade</a>

</div>

<div class="social">

<a href="https://www.instagram.com/syntra.wrld/" target="_blank">
<img src="instagram.png">
</a>

<a href="https://www.linkedin.com/in/syntra-world-03a4723b3/" target="_blank">
<img src="linkedin.png">
</a>

<a href="https://www.tiktok.com/@syntra.wrld?lang=pt-BR" target="_blank">
<img src="tiktok.png">
</a>

<a href="https://wa.me/seunumerodetelefone" target="_blank">
<img src="whatsapp.png">
</a>

</div>

</section>

<section class="community">

<h2>Mensagens da Comunidade</h2>

<div id="communityMessages"></div>

</section>

<script>

function loadMessages(){

let messages = JSON.parse(localStorage.getItem("syntraMessages")) || [];

const container = document.getElementById("communityMessages");

container.innerHTML="";

messages.forEach(msg=>{

const box=document.createElement("div");

box.className="message";

box.innerHTML="<strong>"+msg.nome+"</strong><br>"+msg.mensagem;

container.appendChild(box);

});

}

loadMessages();

</script>

</body>

</html>
