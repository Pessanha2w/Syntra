<section style="padding:60px 8%; background:#ffffff; margin-top:40px;">
    <h2 style="margin-bottom:30px;">Mensagens da Comunidade</h2>
    <div id="communityMessages"></div>
</section>

<script>

function loadMessages(){

    let messages = JSON.parse(localStorage.getItem("syntraMessages")) || [];

    const container = document.getElementById("communityMessages");

    container.innerHTML = "";

    messages.forEach(msg => {

        const box = document.createElement("div");
        box.style.marginBottom = "20px";
        box.style.padding = "15px";
        box.style.background = "#f5f5f3";
        box.style.borderRadius = "10px";

        box.innerHTML = "<strong>" + msg.nome + "</strong><br>" + msg.mensagem;

        container.appendChild(box);

    });
}

loadMessages();

</script>
